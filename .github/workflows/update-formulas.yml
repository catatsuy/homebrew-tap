name: Update Formulae

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      formula:
        description: Formula name to update. Leave empty to update all managed formulae.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      formula_names: ${{ steps.list.outputs.formula_names }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: List managed formulae
        id: list
        env:
          REQUESTED_FORMULA: ${{ github.event.inputs.formula }}
        run: |
          if [ -n "$REQUESTED_FORMULA" ]; then
            if bash ./scripts/update-formula.sh --list | grep -Fxq "$REQUESTED_FORMULA"; then
              formula_names="[\"$REQUESTED_FORMULA\"]"
            else
              formula_names="[]"
            fi
          else
            formula_names=$(bash ./scripts/update-formula.sh --list-json)
          fi

          if [ "$formula_names" = "[]" ]; then
            echo "No managed formula matches the request" >&2
            exit 1
          fi

          echo "formula_names=$formula_names" >> "$GITHUB_OUTPUT"

  update:
    needs: discover
    runs-on: macos-latest
    env:
      HOMEBREW_DEVELOPER: true
    strategy:
      fail-fast: false
      matrix:
        formula_name: ${{ fromJson(needs.discover.outputs.formula_names) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Download purl
        run: |
          case "$(uname -s)" in
            Linux) os="linux" ;;
            Darwin) os="darwin" ;;
            *) echo "Unsupported OS: $(uname -s)" >&2; exit 1 ;;
          esac

          case "$(uname -m)" in
            x86_64) arch="amd64" ;;
            arm64|aarch64) arch="arm64" ;;
            *) echo "Unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          curl -sL "https://github.com/catatsuy/purl/releases/latest/download/purl-${os}-${arch}.tar.gz" | tar xz -C /tmp

      - name: Move purl to /usr/local/bin
        run: sudo mv /tmp/purl /usr/local/bin/

      - name: Update formula
        run: bash ./scripts/update-formula.sh "${{ matrix.formula_name }}"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- "Formula" "scripts"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew
        if: steps.diff.outputs.changed == 'true'
        run: brew update

      - name: Audit formula
        if: steps.diff.outputs.changed == 'true'
        run: brew audit --strict "./Formula/${{ matrix.formula_name }}.rb"

      - name: Build and test formula
        if: steps.diff.outputs.changed == 'true'
        run: |
          brew install -v --build-from-source "./Formula/${{ matrix.formula_name }}.rb"
          brew test "${{ matrix.formula_name }}"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-${{ matrix.formula_name }}
          delete-branch: true
          commit-message: "chore: update ${{ matrix.formula_name }}"
          title: "chore: update ${{ matrix.formula_name }}"
          body: |
            Automated update generated by `.github/workflows/update-formulas.yml`.

            - Updated managed dependencies for `${{ matrix.formula_name }}`
            - Verified with `brew audit --strict` and `brew test`
