name: Update Formulae

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      formula:
        description: Formula name to update. Leave empty to update all managed formulae.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    env:
      HOMEBREW_DEVELOPER: true
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Download purl
        run: |
          if [ "$(uname -s)" != "Darwin" ]; then
            echo "Unsupported OS: $(uname -s)" >&2
            exit 1
          fi

          case "$(uname -m)" in
            x86_64) arch="amd64" ;;
            arm64|aarch64) arch="arm64" ;;
            *) echo "Unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          curl -sL "https://github.com/catatsuy/purl/releases/latest/download/purl-darwin-${arch}.tar.gz" | tar xz -C /tmp

      - name: Move purl to /usr/local/bin
        run: sudo mv /tmp/purl /usr/local/bin/

      - name: Resolve formula list
        id: formulas
        env:
          REQUESTED_FORMULA: ${{ github.event.inputs.formula }}
        run: |
          if [ -n "$REQUESTED_FORMULA" ]; then
            if ! bash ./scripts/update-formula.sh --list | grep -Fxq "$REQUESTED_FORMULA"; then
              echo "No managed formula matches the request: $REQUESTED_FORMULA" >&2
              exit 1
            fi

            formula_names="$REQUESTED_FORMULA"
          else
            formula_names="$(bash ./scripts/update-formula.sh --list)"
          fi

          {
            echo 'formula_names<<EOF'
            printf '%s\n' "$formula_names"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update formulae
        run: |
          while IFS= read -r formula_name; do
            [ -n "$formula_name" ] || continue
            bash ./scripts/update-formula.sh "$formula_name"
          done <<'EOF'
          ${{ steps.formulas.outputs.formula_names }}
          EOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- "Formula" "scripts"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew
        if: steps.diff.outputs.changed == 'true'
        run: brew update

      - name: Build and test formulae
        if: steps.diff.outputs.changed == 'true'
        run: |
          while IFS= read -r formula_name; do
            [ -n "$formula_name" ] || continue
            brew install -v --build-from-source "./Formula/${formula_name}.rb"
            brew test "${formula_name}"
            brew uninstall --force "${formula_name}"
          done <<'EOF'
          ${{ steps.formulas.outputs.formula_names }}
          EOF

      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch_name="automation/update-formulae"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          gh auth setup-git

          git switch -c "$branch_name"
          git add Formula scripts
          git commit -m "chore: update formulae"
          git push --force --set-upstream origin "$branch_name"

      - name: Create or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch_name="automation/update-formulae"
          pr_title="chore: update formulae"
          pr_body=$(cat <<'EOF'
          Automated update generated by `.github/workflows/update-formulas.yml`.

          - Updated managed formulae sequentially on macOS
          - Verified with `brew audit --strict` and `brew test`
          EOF
          )

          pr_number="$(gh pr list --head "$branch_name" --json number --jq '.[0].number')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$pr_title" --body "$pr_body"
          else
            gh pr create --base main --head "$branch_name" --title "$pr_title" --body "$pr_body"
          fi
