name: Homebrew Formula Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    env:
      HOMEBREW_DEVELOPER: true
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Update Homebrew
        run: brew update

      - name: Build and test formulae
        run: |
          find Formula -maxdepth 1 -name '*.rb' -print | sort | while IFS= read -r formula_file; do
            formula_name="$(basename "$formula_file" .rb)"
            brew install -v --build-from-source "./${formula_file}"
            brew test "$formula_name"
            brew uninstall --force "$formula_name"
          done

      - name: Cleanup Homebrew Cache
        run: brew cleanup
